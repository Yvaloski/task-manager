name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # =================== PYTHON ===================
  python:
    name: Python (lint + tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ruff (lint)
        uses: astral-sh/ruff-action@v1

      - name: Black (format check)
        uses: psf/black@stable
        with:
          options: "--check"
  # =================== JAVASCRIPT ===================
  frontend:
    name: JavaScript (lint + format check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Biome (lint + format check)
        uses: biomejs/setup-biome@v2
        with:
          version: "1.9.4"

      - run: biome ci .
        working-directory: frontend
  # =================== DOCKER SCAN ===================
  docker-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Build backend Docker image
        run: docker build -t backend:latest -f backend/Dockerfile backend/

      - name: Build frontend Docker image
        run: docker build -t frontend:latest -f frontend/Dockerfile frontend/

      - name: Scan backend image with Trivy
        run: trivy image --format json --output backend_scan.json backend:latest

      - name: Scan frontend image with Trivy
        run: trivy image --format json --output frontend_scan.json frontend:latest

      - name: Scan images with Trivy
        if: always()
        run: |
          echo "## 🔍 Trivy Security Scan" >> $GITHUB_STEP_SUMMARY

          echo "### 🐳 Backend" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          trivy image --format table backend:latest >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### 🐳 Frontend" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          trivy image --format table frontend:latest >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
  # =================== BUILD ===================
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
