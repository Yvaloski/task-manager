name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # =================== PYTHON ===================
  python:
    name: Python (lint + tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ruff (lint)
        uses: astral-sh/ruff-action@v1

      - name: Black (format check)
        uses: psf/black@stable
        with:
          options: "--check"

      - name: Mypy (type checking)
        working-directory: backend
        run: mypy --config-file pyproject.toml app

      - name: Tests
        working-directory: backend
        run: pytest
  # =================== JAVASCRIPT ===================
  frontend:
    name: JavaScript (lint + format check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Biome (lint + format check)
        uses: biomejs/setup-biome@v2
        with:
          version: "1.9.4"

      - run: biome ci .
        working-directory: frontend
  # =================== DOCKER SCAN ===================
  docker-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t backend:latest -f backend/Dockerfile backend/

      - name: Build frontend Docker image
        run: docker build -t frontend:latest -f frontend/Dockerfile frontend/

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: backend:latest
          format: json
          output: backend_scan.json

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: frontend:latest
          format: json
          output: frontend_scan.json
  # =================== BUILD ===================
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
